<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giochi in evidenza</title>
    <link rel="stylesheet" href="giochi-in-evidenza.css" />
  </head>
  <!-- INIZIO GRIGLIA CARDS GIOCHI IN EVIDENZA -->
  <body>
    <div class="containerGiochiEvidenza">
      <h1 class="titoloGiochiEvidenza">Giochi in evidenza</h1>
      <div class="containerCardsGiochi">
        <div class="bfLogo">
          <div class="content">
            <img src="./images/BF6 LOGO NAKED.svg" alt="BF6" />
            <span class="cta">Sito ufficiale</span>
          </div>
        </div>

        <div class="fcLogo">
          <div class="content">
            <img src="./images/FC26 LOGO NAKED.png" alt="FC26" />
            <span class="cta">Sito ufficiale</span>
          </div>
        </div>

        <div class="splitLogo">
          <div class="content">
            <img
              src="./images/SPLIT FICTION LOGO NAKED.png"
              alt="SPLIT FICTION"
            />
            <span class="cta">Sito ufficiale</span>
          </div>
        </div>

        <div class="thesimsLogo">
          <div class="content">
            <img src="./images/THE SIMS LOGO NAKED.png" alt="THESIMS4" />
            <span class="cta">Sito ufficiale</span>
          </div>
        </div>

        <div class="apexLogo">
          <div class="content">
            <img src="./images/APEX LOGO NAKED.svg" alt="APEX LEGEND" />
            <span class="cta">Sito ufficiale</span>
          </div>
        </div>
      </div>
      <button class="ultimiGiochi">Ultimi Giochi</button>
    </div>
    <!-- FINE GIOCHI IN EVIDENZA -->
  </body>
</html>
