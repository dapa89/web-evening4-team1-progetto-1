<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIDEBAR</title>
    <link rel="stylesheet" href="../css/sideBar.css" />
  </head>
  <body>
    <div class="sideBarContainer">
      <div class="firstLineItems">
        <p class="pSideBar">Tutti i giochi</p>
        <button class="closeBtn">
          <svg
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
            width="20px"
            height="20px"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <path
                fill="black"
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M5.29289 5.29289C5.68342 4.90237 6.31658 4.90237 6.70711 5.29289L12 10.5858L17.2929 5.29289C17.6834 4.90237 18.3166 4.90237 18.7071 5.29289C19.0976 5.68342 19.0976 6.31658 18.7071 6.70711L13.4142 12L18.7071 17.2929C19.0976 17.6834 19.0976 18.3166 18.7071 18.7071C18.3166 19.0976 17.6834 19.0976 17.2929 18.7071L12 13.4142L6.70711 18.7071C6.31658 19.0976 5.68342 19.0976 5.29289 18.7071C4.90237 18.3166 4.90237 17.6834 5.29289 17.2929L10.5858 12L5.29289 6.70711C4.90237 6.31658 4.90237 5.68342 5.29289 5.29289Z"
                fill="#0F1729"
              ></path>
            </g>
          </svg>
        </button>
      
    </div>
    <div class="firstImage">
        <div class="eaLogoContainer">
          <img src="../images/EALOGONAKED.svg" />
        </div>
      </div>
      <div class="picsContainer">
        <div class="fifaLogoContainer">
          <img src="../images/FIFALOGONAKED.svg" alt="fifaIcon" />
        </div>
        <div class="f1LogoContainer">
          <img src="../images/F1LOGONAKED.png" alt="f1Icon" />
        </div>
        <div class="maddenLogoContainer">
          <img src="../images/MADDENLOGONAKED.svg" alt="maddenIcon" />
        </div>
        <div class="apexLogoContainer">
          <img src="../images/APEXLOGONAKED.svg" alt="apexIcon" />
        </div>
        <div class="bfLogoContainer">
          <img src="../images/BFLOGONAKED.svg" alt="bfIcon" />
        </div>
        <div class="theSimsLogoContainer">
          <img src="../images/THESIMSLOGONAKED.png" alt="thesimsIcon" />
        </div>
      </div>
    <script src="../js/sideBar.js"></script>
  </body>
</html>
