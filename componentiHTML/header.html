<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/header.css">
    <title>Document</title>
</head>
<body>
    <!-- NAVBAR -->
    <div class="bannerTop">
      <div class="logoContainer">
        <img src="../images/profile_icon.png" class="profileIcon" />
        <img src="../images/questionmark_icon.png" class="helpButton" />
        <img src="../images/ea_icon.png" class="eaIcon" />
      </div>
    </div>

    <!-- PROFILE MENU -->
    <div class="overlay user-menu-overlay" id="profileMenu">
      <button class="close-btn" id="closeProfile">&times;</button>

      <div class="user-section">
        <a href="#" class="user-button">
          <img src="../images/profilo.jpg" class="user-image" />
          <span class="user-text">Accedi</span>
        </a>

        <a href="#" class="user-button">
          <img src="../images/2eaf2440-dd37-4745-a2fc-1c49b206c13b.jpg" class="user-image" />
          <span class="user-text">Crea account</span>
        </a>
      </div>
    </div>

    <!-- HELP MENU -->
    <div class="overlay help-menu-overlay" id="helpMenu">
      <button class="close-btn" id="closeHelp">&times;</button>

      <div class="support-section">
        <h2 class="main-title">TI SERVE AIUTO?</h2>

        <div class="grid-container">
          <div class="card">
            <img src="../images/foto-1.jpg" class="support-img" width="36px" height="36px" />
            <p>Verificare il mio accesso EA</p>
          </div>

          <div class="card">
            <img src="../images/foto-2.jpg" class="support-img" />
            <p>Collegare i tuoi account di una piattaforma al tuo account EA</p>
          </div>

          <div class="card">
            <img src="../images/foto-1.jpg" class="support-img" />
            <p>Come posso riscattare un codice?</p>
          </div>

          <div class="card">
            <img src="../images/foto-3.jpg" class="support-img" />
            <p>Non riesco a giocare online!</p>
          </div>
        </div>
      <div class="help-footer">
    Non riesci a trovare quello che cerchi?
    Vai a <span>EA Help</span> oppure <span>EA Forums</span>.
  </div>
</div>
<script src="../js/header.js"></script>
</body>
</html>
