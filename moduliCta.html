<!DOCTYPE html>
<html lang="it">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA Play Section</title>
    <link rel="stylesheet" href="moduliCta.css">
 </head>
 <body>
   <section class="ea-play">
     <div class="ea-container">
       <div class="ea-content">
          <div class="ea-logo">
            <img src="images/EA_Play_logo.svg.png" alt="EA Play Logo">
          </div>      
          <h2 class="ea-title">Sblocca un mondo di emozioni</h2>
          <p class="ea-description">
            Approfitta dell'accesso illimitato a una collezione dei migliori titoli EA, a versioni di prova di nuovi giochi selezionati e a molto altro ancora.
          </p>
          <a href="#" class="ea-btn-outline">Iscriviti subito</a>
       </div>
     </div>
   </section>
   <div class="info-bar">
      <div class="info-container">
        <p>Giocatori e genitori: il controllo dei videogiochi è nelle vostre mani</p>
        <a href="#" class="info-button">Scopri di più</a>
      </div>
    </div>
 </body>
</html>
