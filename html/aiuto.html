<!DOCTYPE html>
<html lang="it">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>EA Support Page</title>
   <link rel="stylesheet" href="aiuto.css">
 </head>
 <body>
   <div class="top-bar">
     <button class="close-btn">&times;</button>
   </div>
   <section class="support-section">
     <h2 class="main-title">TI SERVE AIUTO?</h2>
     <div class="grid-container">
       <div class="card">
         <img src="../images/accesso.jpg" alt="Accesso EA" class="support-img">
         <p>Verificare il mio accesso EA</p>
       </div>
       <div class="card">
         <img src="../images/collegamento.jpg" alt="Collega Account" class="support-img">
         <p>Collegare i tuoi account di una piattaforma al tuo account EA</p>
       </div>
       <div class="card">
         <img src="../images/accesso.jpg" alt="Riscatta Codice" class="support-img">
         <p>Come posso riscattare un codice?</p>
       </div>
       <div class="card">
         <img src="../images/aiuto.jpg" alt="Errore Online" class="support-img">
         <p>Non riesco a giocare online!</p>
       </div>
      </div>
      <p class="footer-help">
          Non riesci a trovare quello che cerchi? Vai a <a href="#">EA Help</a> oppure <a href="#">EA Forums</a>.
        </p>
   </section>
 </body>
</html>
